<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopGenie — AI Shopping Assistant</title>
  <style>
    :root {
      --primary-color: #4285f4;
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --text-main: #202124;
      --text-muted: #5f6368;
      --ai-bubble: #f1f3f4;
      --user-bubble: #e8f0fe;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
      --hover-shadow: 0 3px 6px rgba(0,0,0,0.16), 0 3px 6px rgba(0,0,0,0.23);
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'Roboto', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Accessibility focus rings */
    :focus {
      outline: 2px solid var(--primary-color);
      outline-offset: 2px;
    }

    header {
      background: white;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 1px 2px 0 rgba(60,64,67,0.30), 0 1px 3px 1px rgba(60,64,67,0.15);
      z-index: 10;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      color: var(--text-main);
    }

    .header-actions {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }

    #sign-in-btn {
      background: var(--primary-color);
      color: white;
    }

    #cart-btn {
      background: none;
      font-size: 24px;
      position: relative;
      padding: 4px;
    }

    #cart-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: #ea4335;
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
    }

    main {
      flex: 1;
      display: flex;
      padding: 24px;
      gap: 24px;
      overflow: hidden;
    }

    @media (max-width: 768px) {
      main { flex-direction: column; overflow-y: auto; }
      #messages { height: 400px; }
    }

    /* LEFT: Chat Panel */
    .chat-panel {
      flex: 0 0 60%;
      display: flex;
      flex-direction: column;
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.4;
    }

    .message--user {
      align-self: flex-end;
      background-color: var(--user-bubble);
      color: #1a73e8;
      border-bottom-right-radius: 4px;
    }

    .message--assistant {
      align-self: flex-start;
      background-color: var(--ai-bubble);
      color: var(--text-main);
      border-bottom-left-radius: 4px;
    }

    .message--system {
      align-self: center;
      background: none;
      color: var(--text-muted);
      font-style: italic;
      font-size: 12px;
    }

    .input-area {
      border-top: 1px solid #ddd;
      padding-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    #query-input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: var(--radius);
      padding: 10px;
      resize: none;
      font-family: inherit;
    }

    #image-preview {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px;
      background: #f1f3f4;
      border-radius: var(--radius);
    }

    #image-preview img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 4px;
    }

    /* RIGHT: Product Grid */
    .product-panel {
      flex: 1;
      overflow-y: auto;
    }

    #product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .product-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--hover-shadow);
    }

    .product-card img {
      width: 100%;
      height: 150px;
      object-fit: contain;
      margin-bottom: 12px;
    }

    .product-card h3 {
      font-size: 16px;
      margin: 0 0 8px 0;
    }

    .product-card .price {
      font-weight: bold;
      color: var(--primary-color);
      margin: 0 0 8px 0;
    }

    .product-card .reason {
      font-size: 12px;
      color: var(--text-muted);
      flex: 1;
      margin-bottom: 12px;
    }

    .add-to-cart-btn {
      width: 100%;
      background: #f8f9fa;
      border: 1px solid #ddd;
      color: var(--text-main);
    }

    .add-to-cart-btn:hover {
      background: #e8f0fe;
      border-color: var(--primary-color);
    }

    /* Loading Overlay */
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.8);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--primary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Cart Sidebar */
    #cart-sidebar {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 350px;
      background: white;
      box-shadow: -2px 0 5px rgba(0,0,0,0.2);
      padding: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
    }

    [hidden] { display: none !important; }

    #close-cart-btn {
      align-self: flex-start;
      margin-bottom: 24px;
      background: #eee;
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
    }
  </style>
</head>
<body role="main">
  <header>
    <div class="logo">ShopGenie 🧞</div>
    <div class="header-actions">
      <button id="sign-in-btn" aria-label="Sign in with Google">Sign in with Google</button>
      <button id="cart-btn" aria-label="Open shopping cart" hidden>
        🛒 <span id="cart-badge" aria-label="0 items in cart">0</span>
      </button>
    </div>
  </header>

  <main>
    <section class="chat-panel" aria-label="Shopping conversation">
      <div id="messages" role="log" aria-live="polite" aria-label="Chat messages"></div>
      
      <div class="input-area">
        <div id="image-preview" hidden>
          <img src="" alt="Thumbnail preview" />
          <button id="remove-image-btn" aria-label="Remove image">Remove</button>
        </div>
        
        <div class="input-row">
          <textarea id="query-input" placeholder="Ask ShopGenie anything..." aria-label="Shopping query" rows="2"></textarea>
          <button id="upload-btn" aria-label="Upload product image" title="Upload image">📎</button>
          <button id="send-btn" aria-label="Send message">Send</button>
        </div>
        <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" hidden />
      </div>
    </section>

    <section class="product-panel" aria-label="Product recommendations">
      <div id="product-grid" aria-live="polite"></div>
    </section>
  </main>

  <div id="loading" hidden aria-hidden="true">
    <div class="spinner"></div>
    <p>ShopGenie is thinking...</p>
  </div>

  <aside id="cart-sidebar" hidden aria-label="Shopping cart sidebar" tabindex="-1">
    <button id="close-cart-btn" aria-label="Close cart side bar">Close</button>
    <h2>Your Cart</h2>
    <div class="cart-items" id="cart-contents">
      <!-- Items populated by JS -->
    </div>
    <div id="cart-total" style="font-weight: bold; margin-top: 16px;"></div>
  </aside>

  <script type="module" src="app.js"></script>
</body>
</html>
